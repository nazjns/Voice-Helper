<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Helper — Ghi chép thông minh cho học sinh</title>
  <meta name="description" content="Ứng dụng ghi chép thông minh dựa trên giọng nói, hỗ trợ chuyển đổi âm thanh sang văn bản, tóm tắt AI và tạo flashcard tự động cho học sinh và sinh viên." />
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/animations.css" />
  <link rel="stylesheet" href="styles/components.css" />
</head>
<body class="dark-mode">

  <!-- APP SHELL -->
  <div id="app">

    <!-- SIDEBAR NAVIGATION -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="url(#logoGrad)"/>
            <path d="M14 7C12.3 7 11 8.3 11 10V15C11 16.7 12.3 18 14 18C15.7 18 17 16.7 17 15V10C17 8.3 15.7 7 14 7Z" fill="white"/>
            <path d="M8 14C8 17.3 10.7 20 14 20C17.3 20 20 17.3 20 14H22C22 18.4 18.8 22 14.5 22.5V25H13.5V22.5C9.2 22 6 18.4 6 14H8Z" fill="white" opacity="0.8"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
                <stop offset="0%" stop-color="#7C3AED"/>
                <stop offset="100%" stop-color="#06B6D4"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">Voice Helper</span>
      </div>

      <div class="sidebar-nav">
        <button class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" onclick="showPage('record')" id="nav-record">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
          <span>Ghi âm mới</span>
        </button>
        <button class="nav-item" onclick="showPage('notes')" id="nav-notes">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
          <span>Ghi chú</span>
        </button>
        <button class="nav-item" onclick="showPage('flashcards')" id="nav-flashcards">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          <span>Flashcards</span>
        </button>
        <button class="nav-item" onclick="showPage('settings')" id="nav-settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>Cài đặt</span>
        </button>
      </div>

      <div class="sidebar-footer">
        <div class="user-avatar">
          <span>SV</span>
        </div>
        <div class="user-info">
          <span class="user-name">Sinh viên</span>
          <span class="user-role">Free Plan</span>
        </div>
        <button class="upgrade-btn" onclick="alert('Nâng cấp lên Pro để sử dụng không giới hạn!')">Pro ↑</button>
      </div>
    </nav>

    <!-- MOBILE HEADER -->
    <header class="mobile-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="mobile-logo">🎙️ Voice Helper</span>
      <button class="mobile-record-btn" onclick="showPage('record')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
      </button>
    </header>

    <!-- MAIN CONTENT AREA -->
    <main id="main-content" class="main-content">

      <!-- PAGE: DASHBOARD -->
      <div id="page-dashboard" class="page active">
        <div id="dashboard-content"></div>
      </div>

      <!-- PAGE: RECORD -->
      <div id="page-record" class="page">
        <div id="record-content"></div>
      </div>

      <!-- PAGE: NOTES -->
      <div id="page-notes" class="page">
        <div id="notes-content"></div>
      </div>

      <!-- PAGE: FLASHCARDS -->
      <div id="page-flashcards" class="page">
        <div id="flashcards-content"></div>
      </div>

      <!-- PAGE: SETTINGS -->
      <div id="page-settings" class="page">
        <div id="settings-content"></div>
      </div>

    </main>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div id="toast-container" class="toast-container"></div>

  <!-- NOTE DETAIL MODAL -->
  <div id="note-modal" class="modal-overlay" onclick="closeNoteModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div id="note-modal-body"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="scripts/storage.js"></script>
  <script src="scripts/speech.js"></script>
  <script src="scripts/ai.js"></script>
  <script src="scripts/pages/dashboard.js"></script>
  <script src="scripts/pages/record.js"></script>
  <script src="scripts/pages/notes.js"></script>
  <script src="scripts/pages/flashcards.js"></script>
  <script src="scripts/pages/settings.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
